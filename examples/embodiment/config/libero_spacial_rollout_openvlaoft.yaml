defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_collect_openvlaoft"
    logger_backends: ["tensorboard"]

  only_eval: True

  max_epochs: 1
  max_steps: -1

  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 2          # group_size=1 for independent rollouts (no GRPO grouping needed)
  rollout_epoch: 1
  eval_rollout_epoch: 200

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: False

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 10
    group_size: 1
    max_episode_steps: 512
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: True
    auto_reset: False
    ignore_terminations: True
    max_steps_per_rollout_epoch: 512
    reward_coef: ${algorithm.reward_coef}
    reset_gripper_open: False

    video_cfg:
      save_video: False

    data_collection:
      enabled: False
      save_dir: /opt/tiger/collected_data_libero_openvlaoft
      export_format: "pickle"
      only_success: False

  eval:
    total_num_envs: 10
    auto_reset: False
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: True
    group_size: 1
    reset_gripper_open: False
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

    data_collection:
      enabled: True
      save_dir: /mnt/hdfs/zhufangqi/code/RLinWM/collected_data_libero_openvlaoft
      export_format: "pickle"
      only_success: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/opt/tiger/RLinf/vla_models/Openvla-oft-SFT-libero-spatial-traj1"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 16384
  seed: 1234
  enable_offload: True

  model:
    model_path: "/opt/tiger/RLinf/vla_models/Openvla-oft-SFT-libero-spatial-traj1"
    model_type: "openvla_oft"

    unnorm_key: libero_spatial_no_noops
    max_prompt_length: 128

  optim:
    lr: 0.0
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
